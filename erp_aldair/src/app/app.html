<ng-container *ngIf="showMenu">
  <div style="padding: 1rem; background: #1e293b; color: white; display: flex; align-items: center; justify-content: space-between;">

    <div style="display: flex; align-items: center; gap: 1rem;">
      <p-button (click)="sidebarVisible = true" icon="pi pi-bars" [rounded]="true" severity="secondary"></p-button>
      <span style="font-weight: bold; font-size: 1.2rem;">ERP Aldair</span>
    </div>

    <div style="display: flex; align-items: center; gap: 1.5rem;">
      <div style="color: #4ade80; font-weight: bold; border: 1px solid #4ade80; padding: 0.3rem 0.8rem; border-radius: 20px;">
        {{ rutaActual }}
      </div>
      <p-button icon="pi pi-user" [rounded]="true" severity="info" routerLink="/user" title="Mi Perfil"></p-button>
    </div>

  </div>

  <p-sidebar [(visible)]="sidebarVisible">
      <div style="padding: 1rem;">
          <h2>ERP Proyecto</h2>
          <hr>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">

              <p-button label="Dashboard" icon="pi pi-home" [link]="true" routerLink="/dashboard" (click)="sidebarVisible = false"></p-button>

              <p-button *ngIf="auth.hasPermission('group:view')" label="Grupos" icon="pi pi-users" [link]="true" routerLink="/group" (click)="sidebarVisible = false"></p-button>

              <p-button *ngIf="auth.hasPermission('users:view')" label="Super Admin" icon="pi pi-lock" [link]="true" severity="danger" routerLink="/gestion-usuarios" (click)="sidebarVisible = false"></p-button>

          </div>
          <div style="position: absolute; bottom: 20px; left: 20px;">
              <span style="color: #94a3b8; font-size: 0.85rem;">Version {{ appVersion }}</span>
          </div>
      </div>
  </p-sidebar>
</ng-container>

<router-outlet></router-outlet>
