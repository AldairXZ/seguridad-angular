<p-toast></p-toast>

<div class="p-4">
    <div class="flex flex-column md:flex-row justify-content-between align-items-center mb-5 gap-3 bg-white p-4 border-round-xl shadow-1">
        <div>
            <h2 class="m-0 text-900 font-bold text-2xl">Administración de Grupos</h2>
            <span class="text-500 text-sm font-medium">Gestión global de Workspaces</span>
        </div>
        <p-button label="Nuevo Workspace" icon="pi pi-plus" styleClass="p-button-success shadow-1" (onClick)="abrirNuevoGrupo()"></p-button>
    </div>

    <div class="surface-card shadow-1 border-round-xl p-3">
        <p-table [value]="grupos" [rows]="10" [paginator]="true" styleClass="p-datatable-striped p-datatable-sm">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 10%">ID</th>
                    <th style="width: 35%">Nombre del Workspace</th>
                    <th style="width: 25%">Categoría</th>
                    <th style="width: 30%" class="text-center">Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-grupo>
                <tr>
                    <td class="font-bold text-500">#{{grupo.id}}</td>
                    <td class="font-medium text-900">{{grupo.nombre}}</td>
                    <td>
                        <span class="bg-blue-100 text-blue-700 font-bold px-2 py-1 border-round text-sm">
                            {{grupo.categoria || 'General'}}
                        </span>
                    </td>
                    <td class="text-center">
                        <div class="flex justify-content-center gap-2">
                            <p-button icon="pi pi-ticket" (onClick)="verTicketsDelGrupo(grupo)" styleClass="p-button-rounded p-button-text p-button-info" pTooltip="Ver Tickets de este grupo" tooltipPosition="top"></p-button>

                            <p-button icon="pi pi-pencil" (onClick)="editarGrupo(grupo)" styleClass="p-button-rounded p-button-text text-600" pTooltip="Editar" tooltipPosition="top"></p-button>
                            <p-button icon="pi pi-trash" (onClick)="eliminarGrupo(grupo.id)" styleClass="p-button-rounded p-button-text p-button-danger" pTooltip="Eliminar" tooltipPosition="top"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="text-center p-4 text-500 font-medium">No hay grupos registrados en el sistema.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<p-dialog header="{{ grupoActual.id ? 'Editar Workspace' : 'Nuevo Workspace' }}" [(visible)]="displayDialog" [modal]="true" [style]="{width: '450px'}" styleClass="p-fluid border-round-xl">
    <div class="flex flex-column gap-4 mt-3">
        <div class="field">
            <label for="name" class="font-bold text-700">Nombre del Workspace</label>
            <input pInputText id="name" [(ngModel)]="grupoActual.nombre" placeholder="Ej. Soporte Técnico VIP" class="p-inputtext-lg" />
        </div>
        <div class="field">
            <label for="cat" class="font-bold text-700">Categoría / Departamento</label>
            <input pInputText id="cat" [(ngModel)]="grupoActual.categoria" placeholder="Ej. Sistemas, RH, Ventas..." />
        </div>
    </div>
    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2 border-top-1 surface-border pt-3">
            <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text p-button-secondary font-bold" (onClick)="displayDialog=false"></p-button>
            <p-button label="Guardar Grupo" icon="pi pi-save" styleClass="p-button-primary shadow-1" (onClick)="guardarGrupo()"></p-button>
        </div>
    </ng-template>
</p-dialog>
