<div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold text-900 m-0">Dashboard</h1>
    <p-dropdown [options]="grupos" [(ngModel)]="grupoSeleccionado" optionLabel="nombre"
        (onChange)="onGrupoChange($event)" placeholder="Seleccionar Grupo"
        styleClass="w-15rem border-round-3xl border-none shadow-1">
    </p-dropdown>
</div>

<div class="grid mb-5">
    <div class="col-12 md:col-6 lg:col-3" *ngFor="let stat of estadisticas">
        <div class="surface-card shadow-1 p-4 border-round-xl h-full border-top-3"
             [ngClass]="{'border-red-500': stat.color === 'danger', 'border-blue-500': stat.color === 'info', 'border-orange-500': stat.color === 'warning', 'border-green-500': stat.color === 'success'}">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">{{stat.estado}}</span>
                    <div class="text-900 font-bold text-4xl">{{stat.cantidad}}</div>
                </div>
                <div class="flex align-items-center justify-content-center border-round w-3rem h-3rem"
                     [ngClass]="{'bg-red-100 text-red-500': stat.color === 'danger', 'bg-blue-100 text-blue-500': stat.color === 'info', 'bg-orange-100 text-orange-500': stat.color === 'warning', 'bg-green-100 text-green-500': stat.color === 'success'}">
                    <i class="pi pi-ticket text-xl"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="grid">
    <div class="col-12 lg:col-6">
        <div class="surface-card shadow-1 border-round-xl p-4 h-full">
            <h3 class="text-700 font-medium mb-4 mt-0">Distribución por Estado</h3>
            <p-chart type="pie" [data]="pieData" [options]="pieOptions" height="300px"></p-chart>
        </div>
    </div>
    <div class="col-12 lg:col-6">
        <div class="surface-card shadow-1 border-round-xl p-4 h-full">
            <h3 class="text-700 font-medium mb-4 mt-0">Volumen General</h3>
            <p-chart type="bar" [data]="barData" [options]="barOptions" height="300px"></p-chart>
        </div>
    </div>
</div>
