<p-toast></p-toast>

<div style="padding: 2rem; max-width: 800px; margin: 0 auto;">
  <p-card styleClass="p-card-shadow">
    <ng-template pTemplate="title">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <p-avatar icon="pi pi-user" size="xlarge" shape="circle" [style]="{'background-color': '#002D72', 'color': '#ffffff'}"></p-avatar>
        <span style="font-size: 1.5rem; color: #334155;">Mi Perfil de Acceso</span>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      <p-divider></p-divider>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">

        <div style="display: flex; flex-direction: column;">
          <span style="font-weight: bold; color: #64748b;">Usuario Activo</span>
          <span style="font-size: 1.1rem; margin-top: 0.2rem; color: #1e293b;">{{ userData.nombre }}</span>
        </div>

        <div style="display: flex; flex-direction: column;">
          <span style="font-weight: bold; color: #64748b;">Email Institucional</span>
          <span style="font-size: 1.1rem; margin-top: 0.2rem; color: #1e293b;">{{ userData.email }}</span>
        </div>

        <div style="display: flex; flex-direction: column; grid-column: span 2;">
          <span style="font-weight: bold; color: #64748b;">Tokens y Permisos Autorizados</span>
          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem;">
            <span *ngFor="let perm of userData.permisos" style="background: #e2e8f0; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; color: #475569; border: 1px solid #cbd5e1;">
              <i class="pi pi-check-circle" style="font-size: 0.8rem; margin-right: 4px; color: #10b981;"></i> {{ perm }}
            </span>
          </div>
        </div>

      </div>
    </ng-template>

    <ng-template pTemplate="footer">
      <p-divider></p-divider>
      <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
        <p-button *appHasPermission="'user:edit:profile'" label="Guardar Cambios" icon="pi pi-save" severity="success" (click)="actualizarUsuario()"></p-button>
        <p-button label="Cerrar Sesión Segura" icon="pi pi-sign-out" [outlined]="true" severity="danger" (click)="auth.logout()"></p-button>
      </div>
    </ng-template>
  </p-card>
</div>
