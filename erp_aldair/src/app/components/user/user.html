<div style="padding: 2rem; background: #f8fafc; min-height: calc(100vh - 70px);">
    <div style="max-width: 800px; margin: 0 auto;">

        <p-card styleClass="p-card-shadow border-round-xl">
            <div class="flex align-items-center gap-4 mb-4">
                <p-avatar
                    [label]="usuario?.nombre?.charAt(0)"
                    size="xlarge"
                    shape="circle"
                    styleClass="bg-primary text-white text-4xl shadow-2"
                    [style]="{'width': '100px', 'height': '100px'}">
                </p-avatar>
                <div>
                    <h1 class="m-0 text-900">{{ usuario?.nombre }}</h1>
                    <p class="text-600 m-0 text-xl">{{ usuario?.email }}</p>
                    <p-tag severity="success" value="Cuenta Verificada" styleClass="mt-2"></p-tag>
                </div>
            </div>

            <p-divider></p-divider>

            <div class="grid mt-4">
                <div class="col-12 md:col-6 mb-3">
                    <label class="block font-bold text-700 mb-2">Identificador Único (ID)</label>
                    <div class="p-3 surface-100 border-round font-mono text-800">
                        {{ usuario?.id }}
                    </div>
                </div>
                <div class="col-12 md:col-6 mb-3">
                    <label class="block font-bold text-700 mb-2">Estado de Sesión</label>
                    <div class="p-3 surface-100 border-round text-primary font-bold">
                        <i class="pi pi-shield mr-2"></i> JWT Activo
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <h3 class="text-900 border-bottom-1 surface-border pb-2">
                    <i class="pi pi-key mr-2"></i> Permisos Técnicos Asignados
                </h3>
                <p class="text-600 mb-3">Estas acciones están autorizadas en su token de acceso actual:</p>

                <div class="flex flex-wrap gap-2">
                    <ng-container *ngFor="let p of usuario?.permisos">
                        <p-tag
                            [value]="formatPerm(p)"
                            [rounded]="true"
                            severity="info"
                            styleClass="px-3 py-2 shadow-1">
                        </p-tag>
                    </ng-container>
                </div>
            </div>

            <div class="mt-6 flex justify-content-between align-items-center">
                <span class="text-600 text-sm">
                    Los cambios de permisos requieren reiniciar sesión para actualizar el token.
                </span>
                <p-button
                    label="Cerrar Sesión Segura"
                    icon="pi pi-sign-out"
                    severity="danger"
                    [outlined]="true"
                    (onClick)="logout()">
                </p-button>
            </div>
        </p-card>

    </div>
</div>
