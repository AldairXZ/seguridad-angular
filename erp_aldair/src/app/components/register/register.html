<p-toast></p-toast>
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f8fafc; padding: 2rem;">
  <p-card header="Crear Nueva Cuenta" [style]="{width: '600px', 'max-width': '100%'}" styleClass="p-card-shadow">

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Usuario</label>
          <input pInputText formControlName="usuario" style="width: 100%;" />
        </div>

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Nombre Completo</label>
          <input pInputText formControlName="nombreCompleto" style="width: 100%;" />
        </div>

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Email</label>
          <input pInputText type="email" formControlName="email" style="width: 100%;" />
        </div>

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Teléfono</label>
          <input pInputText pKeyFilter="int" formControlName="telefono" style="width: 100%;" />
        </div>

        <div class="field" style="grid-column: span 2;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Dirección</label>
          <input pInputText formControlName="direccion" style="width: 100%;" />
        </div>

        <div class="field" style="grid-column: span 2;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Fecha de Nacimiento</label>
          <p-calendar formControlName="fechaNacimiento" [showIcon]="true" dateFormat="dd/mm/yy" styleClass="w-full"></p-calendar>
          <small class="p-error" *ngIf="registerForm.get('fechaNacimiento')?.hasError('menorDeEdad') && registerForm.get('fechaNacimiento')?.touched" style="display: block; margin-top: 0.5rem;">
            Debes ser mayor de 18 años.
          </small>
        </div>

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Contraseña</label>
          <p-password formControlName="password" [toggleMask]="true" [style]="{'width':'100%'}" [inputStyle]="{'width':'100%'}"></p-password>
        </div>

        <div class="field">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #334155;">Confirmar Contraseña</label>
          <p-password formControlName="confirmarPassword" [feedback]="false" [toggleMask]="true" [style]="{'width':'100%'}" [inputStyle]="{'width':'100%'}"></p-password>
          <small class="p-error" *ngIf="registerForm.hasError('notSame') && registerForm.get('confirmarPassword')?.touched" style="display: block; margin-top: 0.5rem;">
            Las contraseñas no coinciden.
          </small>
        </div>

      </div>

      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
        <p-button label="Cancelar" [text]="true" severity="secondary" routerLink="/login"></p-button>
        <p-button label="Registrar Cuenta" type="submit" [disabled]="registerForm.invalid"></p-button>
      </div>
    </form>

  </p-card>
</div>
